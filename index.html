<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历代状元籍贯分布</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f0e8;
      color: #2c1a0e;
      min-height: 100vh;
    }

    #header {
      background: linear-gradient(135deg, #7b1e1e 0%, #c0392b 100%);
      color: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      flex-wrap: wrap;
    }

    #header h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
    #header-stats { font-size: 13px; opacity: 0.85; }
    #header-note { font-size: 11px; opacity: 0.6; margin-left: auto; }

    #main { display: flex; height: calc(100vh - 52px); }

    /* ── 地图 ── */
    #map-container { flex: 1 1 60%; min-width: 0; }
    #map { width: 100%; height: 100%; }

    /* ── 侧边栏 ── */
    #sidebar {
      flex: 0 0 360px;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-left: 1px solid #ddd;
      overflow: hidden;
    }

    #filter-panel {
      padding: 12px 14px 10px;
      background: #fdf8f2;
      border-bottom: 1px solid #e8ddd0;
    }

    #filter-panel h3 {
      font-size: 11px;
      color: #7b5a3a;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    #dynasty-filter { display: flex; flex-wrap: wrap; gap: 5px; }

    .dynasty-btn {
      padding: 3px 9px;
      border-radius: 12px;
      border: 1.5px solid #c0392b;
      background: transparent;
      color: #c0392b;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .dynasty-btn.active { background: #c0392b; color: #fff; }
    .dynasty-btn:hover:not(.active) { background: #f9e8e5; }

    #filter-actions { margin-top: 7px; display: flex; gap: 7px; }

    .action-btn {
      padding: 2px 9px;
      border: 1px solid #bbb;
      background: #fff;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      color: #555;
      font-family: inherit;
    }
    .action-btn:hover { background: #f0f0f0; }

    /* ── 排行榜 ── */
    #ranking-panel { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    #ranking-header {
      padding: 8px 14px 6px;
      font-size: 11px;
      color: #7b5a3a;
      letter-spacing: 1px;
      border-bottom: 1px solid #eee;
      background: #fdf8f2;
      text-transform: uppercase;
    }

    #ranking-list { flex: 1; overflow-y: auto; }
    #ranking-list::-webkit-scrollbar { width: 4px; }
    #ranking-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .rank-row {
      display: grid;
      grid-template-columns: 34px 1fr 48px 64px;
      align-items: center;
      padding: 7px 14px;
      border-bottom: 1px solid #f0ebe5;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }

    .rank-row:hover { background: #fef8f4; }
    .rank-row.selected { background: #fde8e5; border-left: 3px solid #c0392b; padding-left: 11px; }

    .rank-num { font-size: 13px; font-weight: 700; color: #ccc; }
    .rank-row:nth-child(-n+3) .rank-num { color: #c0392b; }
    .rank-province { font-size: 14px; font-weight: 500; }
    .rank-count { font-size: 14px; font-weight: 700; color: #c0392b; text-align: right; }
    .rank-top-dynasty { font-size: 11px; color: #999; text-align: right; padding-left: 4px; }

    .rank-detail {
      display: none;
      padding: 8px 14px 12px;
      background: #fef8f4;
      border-bottom: 1px solid #f0ebe5;
    }
    .rank-detail.open { display: block; }

    .rank-detail-title { font-size: 11px; color: #7b5a3a; margin-bottom: 6px; }

    .dynasty-section { margin-bottom: 6px; }
    .dynasty-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
      font-weight: 500;
    }

    .person-list { display: flex; flex-wrap: wrap; gap: 3px; }
    .person-tag {
      font-size: 12px;
      background: #fff;
      border: 1px solid #e8ddd0;
      border-radius: 3px;
      padding: 2px 6px;
      color: #333;
    }
    .person-tag.uncertain { opacity: 0.6; border-style: dashed; }
    .person-tag span { font-size: 10px; color: #aaa; margin-left: 2px; }

    #empty-state { display: none; padding: 40px 16px; text-align: center; color: #bbb; font-size: 14px; }

    @media (max-width: 768px) {
      #main { flex-direction: column; height: auto; }
      #map-container { height: 55vw; min-height: 260px; }
      #sidebar { flex: none; max-height: 50vh; }
    }
  </style>
</head>

// 自动去重（同名 + 同朝代 + 同年份 → 保留第一条）
const ZHUANGYUAN_DATA = _RAW.filter((r, i, arr) =>
  arr.findIndex(x => x.name === r.name && x.dynasty === r.dynasty && x.year === r.year) === i
);

// ─────────────────────────────────────────
//  朝代配置
// ─────────────────────────────────────────
const DYNASTIES = [
  { key:"隋",     label:"隋",   color:"#6d8fce" },
  { key:"唐",     label:"唐",   color:"#e67e22" },
  { key:"五代十国",label:"五代", color:"#9b59b6" },
  { key:"北宋",   label:"北宋", color:"#27ae60" },
  { key:"南宋",   label:"南宋", color:"#17a059" },
  { key:"辽",     label:"辽",   color:"#16a085" },
  { key:"金",     label:"金",   color:"#e8b210" },
  { key:"元",     label:"元",   color:"#8e44ad" },
  { key:"明",     label:"明",   color:"#2980b9" },
  { key:"清",     label:"清",   color:"#c0392b" },
];

// ─────────────────────────────────────────
//  省名映射（数据短名 ↔ GeoJSON 全称）
// ─────────────────────────────────────────
const PROVINCE_FULL = {
  "北京":"北京市","天津":"天津市","上海":"上海市","重庆":"重庆市",
  "河北":"河北省","山西":"山西省","辽宁":"辽宁省","吉林":"吉林省",
  "黑龙江":"黑龙江省","江苏":"江苏省","浙江":"浙江省","安徽":"安徽省",
  "福建":"福建省","江西":"江西省","山东":"山东省","河南":"河南省",
  "湖北":"湖北省","湖南":"湖南省","广东":"广东省","海南":"海南省",
  "四川":"四川省","贵州":"贵州省","云南":"云南省","陕西":"陕西省",
  "甘肃":"甘肃省","青海":"青海省","内蒙古":"内蒙古自治区",
  "广西":"广西壮族自治区","西藏":"西藏自治区","宁夏":"宁夏回族自治区",
  "新疆":"新疆维吾尔自治区","台湾":"台湾省","香港":"香港特别行政区","澳门":"澳门特别行政区",
};
const PROVINCE_SHORT = Object.fromEntries(Object.entries(PROVINCE_FULL).map(([k,v])=>[v,k]));

// ─────────────────────────────────────────
//  状态
// ─────────────────────────────────────────
let selectedDynasties = new Set(DYNASTIES.map(d => d.key));
let selectedProvince = null;
let chart = null;

// ─────────────────────────────────────────
//  筛选器
// ─────────────────────────────────────────
function initFilter() {
  const container = document.getElementById("dynasty-filter");
  DYNASTIES.forEach(d => {
    const btn = document.createElement("button");
    btn.className = "dynasty-btn active";
    btn.textContent = d.label;
    btn.dataset.key = d.key;
    btn.addEventListener("click", () => toggleDynasty(d.key, btn));
    container.appendChild(btn);
  });
}

function toggleDynasty(key, btn) {
  if (selectedDynasties.has(key)) { selectedDynasties.delete(key); btn.classList.remove("active"); }
  else { selectedDynasties.add(key); btn.classList.add("active"); }
  updateView();
}

function selectAll() {
  selectedDynasties = new Set(DYNASTIES.map(d => d.key));
  document.querySelectorAll(".dynasty-btn").forEach(b => b.classList.add("active"));
  updateView();
}

function clearAll() {
  selectedDynasties.clear();
  document.querySelectorAll(".dynasty-btn").forEach(b => b.classList.remove("active"));
  updateView();
}

// ─────────────────────────────────────────
//  数据聚合
// ─────────────────────────────────────────
function aggregateByProvince() {
  const filtered = ZHUANGYUAN_DATA.filter(r =>
    selectedDynasties.has(r.dynasty) && r.province !== "不详"
  );
  const map = {};
  filtered.forEach(r => {
    if (!map[r.province]) map[r.province] = { province:r.province, count:0, dynastyCount:{}, persons:[] };
    map[r.province].count++;
    map[r.province].dynastyCount[r.dynasty] = (map[r.province].dynastyCount[r.dynasty]||0)+1;
    map[r.province].persons.push(r);
  });
  const rows = Object.values(map).sort((a,b) => b.count - a.count);
  rows.forEach(r => {
    r.topDynasty = Object.entries(r.dynastyCount).sort((a,b)=>b[1]-a[1])[0]?.[0] || "";
  });
  return rows;
}

// ─────────────────────────────────────────
//  主更新
// ─────────────────────────────────────────
function updateView() {
  const rows = aggregateByProvince();
  const total = ZHUANGYUAN_DATA.filter(r => selectedDynasties.has(r.dynasty)).length;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-provinces").textContent = rows.length;
  updateMap(rows);
  updateList(rows);
}

// ─────────────────────────────────────────
//  地图
// ─────────────────────────────────────────
function initChart(geoJson) {
  echarts.registerMap("china", geoJson);
  chart = echarts.init(document.getElementById("map"), null, { renderer:"canvas" });
  chart.on("click", params => {
    if (params.componentType === "series") {
      const shortName = PROVINCE_SHORT[params.name] || params.name;
      highlightProvince(shortName);
    }
  });
  window.addEventListener("resize", () => chart.resize());
  updateView();
}

function updateMap(rows) {
  if (!chart) return;
  const maxCount = rows[0]?.count || 1;
  const dataMap = {};
  rows.forEach(r => { dataMap[r.province] = r.count; });

  chart.setOption({
    backgroundColor: "#f5f0e8",
    tooltip: {
      trigger: "item",
      formatter: params => {
        const shortName = PROVINCE_SHORT[params.name] || params.name;
        const count = dataMap[shortName] || 0;
        if (!count) return `<b>${shortName}</b><br/>暂无记录`;
        const row = rows.find(r => r.province === shortName);
        const breakdown = Object.entries(row?.dynastyCount||{})
          .sort((a,b)=>b[1]-a[1]).map(([d,c])=>`${d} ${c}人`).join("　");
        return `<b>${shortName}</b><br/>状元共 <b>${count}</b> 位<br/><span style="color:#aaa;font-size:12px">${breakdown}</span>`;
      }
    },
    visualMap: {
      min:0, max:maxCount,
      text:["多","少"],
      calculable:false,
      inRange:{ color:["#fae8e0","#e8a090","#c0392b"] },
      textStyle:{ color:"#666", fontSize:11 },
      bottom:20, left:16, itemWidth:12, itemHeight:70,
    },
    series:[{
      type:"map", map:"china", roam:true,
      scaleLimit:{ min:0.8, max:4 },
      label:{ show:false },
      emphasis:{ label:{ show:true, color:"#2c1a0e", fontSize:12 }, itemStyle:{ areaColor:"#f5b78e" } },
      select:{
        label:{ show:true, color:"#2c1a0e", fontSize:12, fontWeight:"bold" },
        itemStyle:{ areaColor:"#f5b78e", borderColor:"#c0392b", borderWidth:2 }
      },
      selectedMode:"single",
      // 用 GeoJSON 全称作为 name，value 来自短名映射
      data: Object.entries(dataMap).map(([short,value])=>({
        name: PROVINCE_FULL[short] || short, value
      })),
    }],
  });
}

// ─────────────────────────────────────────
//  排行列表
// ─────────────────────────────────────────
function updateList(rows) {
  const list = document.getElementById("ranking-list");
  const empty = document.getElementById("empty-state");
  if (!rows.length) { list.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display = "none";

  list.innerHTML = rows.map((r,i) => {
    const isSelected = selectedProvince === r.province;
    // 按朝代分组展示状元
    const byDynasty = {};
    r.persons.forEach(p => {
      (byDynasty[p.dynasty] = byDynasty[p.dynasty]||[]).push(p);
    });
    const dynastyOrder = DYNASTIES.map(d=>d.key).filter(k=>byDynasty[k]);
    const detailHTML = dynastyOrder.map(d => `
      <div class="dynasty-section">
        <div class="dynasty-label">${d}（${byDynasty[d].length}人）</div>
        <div class="person-list">
          ${byDynasty[d].sort((a,b)=>(a.year||0)-(b.year||0)).map(p=>`
            <div class="person-tag${p.uncertain?' uncertain':''}" title="${p.uncertain?'存疑记录':''}">
              ${p.name}<span>${p.year||'?'}年</span>
            </div>`).join("")}
        </div>
      </div>`).join("");

    return `
      <div class="rank-row${isSelected?' selected':''}" data-province="${r.province}" onclick="handleRowClick('${r.province}')">
        <div class="rank-num">${i+1}</div>
        <div class="rank-province">${r.province}</div>
        <div class="rank-count">${r.count}</div>
        <div class="rank-top-dynasty">${r.topDynasty}最多</div>
      </div>
      <div class="rank-detail${isSelected?' open':''}" id="detail-${r.province}">
        <div class="rank-detail-title">${r.province} · 历代状元 ${r.count} 人</div>
        ${detailHTML}
      </div>`;
  }).join("");
}

// ─────────────────────────────────────────
//  联动
// ─────────────────────────────────────────
function handleRowClick(province) {
  const wasSelected = selectedProvince === province;
  if (selectedProvince && chart) chart.dispatchAction({type:"unselect",seriesIndex:0,name:PROVINCE_FULL[selectedProvince]||selectedProvince});
  selectedProvince = wasSelected ? null : province;
  if (selectedProvince && chart) chart.dispatchAction({type:"select",seriesIndex:0,name:PROVINCE_FULL[selectedProvince]||selectedProvince});
  updateList(aggregateByProvince());
}

function highlightProvince(province) {
  selectedProvince = selectedProvince === province ? null : province;
  updateList(aggregateByProvince());
  setTimeout(() => {
    const el = document.querySelector(`[data-province="${province}"]`);
    if (el) el.scrollIntoView({ behavior:"smooth", block:"nearest" });
  }, 50);
}

// ─────────────────────────────────────────
//  启动
// ─────────────────────────────────────────
initFilter();

fetch("https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json")
  .then(r => r.json())
  .then(geoJson => initChart(geoJson))
  .catch(() => {
    document.getElementById("map").innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:14px;">' +
      '地图加载失败，请检查网络后刷新。</div>';
    updateView();
  });
</script>
